server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://14.225.254.174:5555/food_ordering
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

service:
  user-url: ${USER_SERVICE_API_URL:http://localhost:8081/api/users}
  food-url: ${FOOD_SERVICE_API_URL:http://localhost:8082/api/foods}