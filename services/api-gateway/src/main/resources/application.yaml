server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-auth-route
              uri: ${USER_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/auth,/api/auth/**

            - id: user-route
              uri: ${USER_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/users,/api/users/**

            - id: food-route
              uri: ${FOOD_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/foods,/api/foods/**

            - id: order-route
              uri: ${ORDER_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/orders,/api/orders/**

            - id: payment-route
              uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/payments,/api/payments/**

            - id: order-ws-route
              uri: ${ORDER_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/ws-order,/ws-order/**