version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: food-ordering-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: food_ordering
    ports:
      - "5555:5432"
    volumes:
      - /opt/food-ordering/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d food_ordering"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: